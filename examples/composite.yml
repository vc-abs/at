# #TODO: Support intra dependency between columns.
sources:
  - ashtakavarga
  - scenario
computations:
  fields:
    dharma: "h1 + h5 + h9"
    artha: "h2 + h6 + h10"
    kama: "h3 + h7 + h11"
    moksha: "h4 + h8 + h12"
    peak:
      max:
        - dharma
        - artha
        - kama
        - moksha
report:
  order:
    peak: descending
  fieldSets:
    scenario: all
    panchang: all
scenarios:
  default: {}
  custom:
    month: 3
