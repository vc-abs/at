ayanamsa: raman # as supported by the underlying package, pyswisseph.
year: 2020
month: 1
day: 4
hour: 6
minute: 0
second: 0
# Timezone is split into hour and minute parts. The hour part could be negative.
utcHour: 5
utcMinute: 30
# Latitude and Longitude in Decimal Degrees (as given by Google Maps).
latitude: 23.101
longitude: 77.461
interval: "60min" # a pandas date_range frequency alias.
count: 100
exportTo: "./.sample.csv"
sources:
  - muhurtaYogaEffects
  - objectHouses
  - ashtakavarga
computations:
  fields:
    dharma: "h1 + h5 + h9"
    muhurtaYogaEffect: "positive + negative"
    maxOfDharma:
      max: ["h1", "h5", "h9"]

report:
  selection: "dharma > 75"
  order:
    dharma: descending
    muhurtaYogaEffect: descending
  fieldSets:
    scenario: all
    panchang: all
    muhurtaYogaEffects: all
    objectHouses: all
    ashtakavarga: all
