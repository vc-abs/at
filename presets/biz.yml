sources:
  - muhurtaYogaEffects
  - objectHouses
  - ashtakavarga
computations:
  fields:
    biz: "h2 + h6 + h9 + h10 + h11"
    muhurtaYogaEffect: "positive + negative"
    minH:
      min:
        - h2
        - h6
        - h9
        - h10
        - h11
report:
  selection: "biz > 150 and muhurtaYogaEffect > 0 and minH >= 28"
  order:
    biz: descending
    muhurtaYogaEffect: descending
  fieldSets:
    muhurtaYogaEffects: all
    objectHouses: all
    ashtakavarga: all
