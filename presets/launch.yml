constants:
  tabooTimeFlagsRegex: 'RK|YG|GK'
  launchWeekdayWeights:
    wednesday: 28
    friday: 24
    thursday: 22
    sunday: 20
  launchNakshatras:
    - asvini
    - rohini
    - mrigashira
    - punarvasu
    - pushya
    - hasta
    - svati
    - anuradha
    - shravana
    - dhanishta
    - revati
  launchPreferredTithis:
    - 2
    - 3
    - 5
    - 7
    - 10
    - 11
    - 13
  launchDiscouragedTithis:
    - 4
    - 8
    - 9
  launchWaningRiktaTithis:
    - 19
    - 24
    - 29
  launchWaningPoornaTithis:
    - 20
    - 25
  launchMinHouses:
    - h1
    - h2
    - h7
    - h10
    - h11
  launchCorePlanets:
    - mercury
    - venus
    - jupiter
    - moon
    - sun
query: >-
  timeF.str.contains(constants.tabooTimeFlagsRegex, na=False) == False and
  tithi != 0 and
  tithi != 14 and
  meQ != 'malefic' and
  muhurtaYogaEffect >= 0 and
  launchMin >= 23 and
  weekdayScore > 0 and
  launchScore >= 285
customColumns:
  # House policy:
  # - prioritize commencement and transactability houses more than campaign houses
  # - keep 1st, 2nd, 7th, 10th, and 11th as the main launch anchors
  # - retain 3rd, 5th, and 9th as supporting houses for initiative, presentation,
  #   and grace without letting them dominate the launch score
  launchHouseScore: >-
    (h1 * 1.2 + h2 * 1.4 + h7 * 1.4 + h10 * 1.5 + h11 * 1.6 +
    h3 * 0.8 + h5 * 0.7 + h9 * 1.0) * 0.38
  muhurtaYogaEffect: >-
    positive + negative
  launchMin:
    min: constants.launchMinHouses
  weekdayScore: >-
    vaara.map(constants.launchWeekdayWeights).fillna(0)
  nakshatraScore: >-
    nakshatra.isin(constants.launchNakshatras) * 34
  # Tithi policy:
  # - reuse the same broadly favorable launch/commercial tithis as marketing,
  #   but keep the bonuses slightly lower than the campaign-oriented preset
  tithiScore: >-
    tithi.isin(constants.launchPreferredTithis) * 26 +
    (tithi == 15) * 8 -
    tithi.isin(constants.launchDiscouragedTithis) * 18 -
    ((tithi >= 16) & (tithi <= 20)) * 6 -
    ((tithi >= 21) & (tithi <= 25)) * 12 -
    ((tithi >= 26) & (tithi <= 29)) * 20 -
    tithi.isin(constants.launchWaningRiktaTithis) * 4 +
    tithi.isin(constants.launchWaningPoornaTithis) * 4
  # Quality policy:
  # - score only planets whose `Q` can vary in the current implementation
  # - Mercury can be benefic / neutral / malefic
  # - Moon can be benefic / malefic under the current tithi-based rule
  # - fixed-nature planets are handled through other rubric parts rather than
  #   through constant or impossible quality branches here
  qualityScore: >-
    (meQ == 'benefic') * 20 +
    (meQ == 'neutral') * 10 +
    (moQ == 'benefic') * 18
  # Dasha policy:
  # - reward launch-supportive lords (Mercury, Venus, Jupiter, Moon, Sun)
  # - keep the same bounded MD/AD/PAD weighting pattern for the first pass
  mdPhaseScore: >-
    mdLord.isin(constants.launchCorePlanets) *
    (6 + mdlStrength * 4 + mdRemainder * 6)
  adPhaseScore: >-
    adLord.isin(constants.launchCorePlanets) *
    (5 + adlStrength * 3 + adRemainder * 4)
  padPhaseScore: >-
    padLord.isin(constants.launchCorePlanets) *
    (3 + padlStrength * 2 + padRemainder * 3)
  dashaScore: >-
    mdPhaseScore + adPhaseScore + padPhaseScore
  baseLaunchScore: >-
    launchHouseScore + muhurtaYogaEffect * 12 + weekdayScore +
    nakshatraScore + tithiScore + qualityScore + dashaScore
  # Gowri policy:
  # - mirror the marketing preset's simple additive multiplier approach
  gowriLaunchAdj: >-
    gowriScore * 18.5
  # Special-planet Shadbala policy:
  # - use the same five launch-relevant planets and the same neutral-strength
  #   reference / multiplier shape as marketing for consistency
  launchSpecialStrength: >-
    (meS + veS + moS + juS + suS) / 5
  launchShadbalaAdj: >-
    (launchSpecialStrength - 1.27) * 120
  launchScore: >-
    baseLaunchScore + gowriLaunchAdj + launchShadbalaAdj
order:
  launchScore: descending
  baseLaunchScore: descending
  muhurtaYogaEffect: descending
fieldSets:
  event:
    - date
    - time
  panchang:
    - tithi
    - nakshatra
    - vaara
    - launchScore
  planetQualities:
    - meQ
    - moQ
  timeFlags:
    - timeF
  muhurtaYogaEffects:
    - positive
    - negative
    - yogas
  mahaDasha:
    - mdLord
  antarDashas:
    - adLord
    - padLord
  shadBalaStrength: none
  objectHouses: all
  ashtakavarga: all
