constants:
  tabooTimeFlagsRegex: 'RK|YG|GK'
  marketingWeekdayWeights:
    wednesday: 30
    friday: 24
    thursday: 22
    sunday: 18
  marketingNakshatras:
    - asvini
    - rohini
    - mrigashira
    - punarvasu
    - pushya
    - hasta
    - chitra
    - svati
    - anuradha
    - shravana
    - dhanishta
    - revati
  marketingPreferredTithis:
    - 2
    - 3
    - 5
    - 7
    - 10
    - 11
    - 13
  marketingDiscouragedTithis:
    - 4
    - 8
    - 9
  marketingWaningRiktaTithis:
    - 19
    - 24
    - 29
  marketingWaningPoornaTithis:
    - 20
    - 25
  marketingMinHouses:
    - h3
    - h5
    - h7
    - h10
    - h11
  marketingCorePlanets:
    - mercury
    - venus
    - jupiter
    - moon
    - sun
query: >-
  timeF.str.contains(constants.tabooTimeFlagsRegex, na=False) == False and
  tithi != 0 and
  tithi != 14 and
  meQ != 'malefic' and
  muhurtaYogaEffect >= 0 and
  marketingMin >= 24 and
  weekdayScore > 0 and
  marketingScore >= 300
customColumns:
  # House policy:
  # - weight communication and public-impact houses more strongly for marketing
  # - prioritize 3rd (media/outreach), 10th (visibility), and 11th (gains/reach)
  # - keep 2nd, 5th, and 7th as important secondary supports
  # - scale the combined house score down so house support stays important without
  #   dominating the overall marketing score
  marketingHouseScore: >-
    (h2 * 0.9 + h5 * 1.0 + h7 * 1.2 + h3 * 1.5 + h10 * 1.6 + h11 * 1.7) * 0.42
  muhurtaYogaEffect: >-
    positive + negative
  marketingMin:
    min: constants.marketingMinHouses
  weekdayScore: >-
    vaara.map(constants.marketingWeekdayWeights).fillna(0)
  nakshatraScore: >-
    nakshatra.isin(constants.marketingNakshatras) * 36
  # Tithi policy:
  # - keep strong bonuses for the explicitly preferred tithis from marketing.md
  # - give a small bonus to 15 (full-moon side)
  # - penalize 4/8/9 as discouraged marketing/commercial tithis
  # - grade waning-half penalties by closeness to Amavasya
  # - add a small extra penalty for waning Rikta tithis (19/24/29)
  # - add a slight recovery for waning Poorna tithis (20/25)
  tithiScore: >-
    tithi.isin(constants.marketingPreferredTithis) * 28 +
    (tithi == 15) * 10 -
    tithi.isin(constants.marketingDiscouragedTithis) * 18 -
    ((tithi >= 16) & (tithi <= 20)) * 8 -
    ((tithi >= 21) & (tithi <= 25)) * 14 -
    ((tithi >= 26) & (tithi <= 29)) * 22 -
    tithi.isin(constants.marketingWaningRiktaTithis) * 6 +
    tithi.isin(constants.marketingWaningPoornaTithis) * 4
  # Quality policy:
  # - score only planets whose `Q` can vary in the current implementation
  # - Mercury can be benefic / neutral / malefic
  # - Moon can be benefic / malefic
  # - fixed-nature planets are handled through other rubric parts rather than
  #   through constant or impossible quality branches here
  qualityScore: >-
    (meQ == 'benefic') * 20 +
    (meQ == 'neutral') * 10 +
    (moQ == 'benefic') * 18
  # Dasha policy:
  # - reward marketing-supportive lords (Mercury, Venus, Jupiter, Moon, Sun)
  # - give MD the highest weight, then AD, then PAD
  # - blend lord identity with the current dasha lord strength and remaining fraction
  # - use the deeper AD/PAD phase strengths and remainders internally for scoring,
  #   while keeping the exported table compact with only the visible dasha lords
  mdPhaseScore: >-
    mdLord.isin(constants.marketingCorePlanets) *
    (6 + mdlStrength * 4 + mdRemainder * 6)
  adPhaseScore: >-
    adLord.isin(constants.marketingCorePlanets) *
    (5 + adlStrength * 3 + adRemainder * 4)
  padPhaseScore: >-
    padLord.isin(constants.marketingCorePlanets) *
    (3 + padlStrength * 2 + padRemainder * 3)
  dashaScore: >-
    mdPhaseScore + adPhaseScore + padPhaseScore
  baseMarketingScore: >-
    marketingHouseScore + muhurtaYogaEffect * 12 + weekdayScore +
    nakshatraScore + tithiScore + qualityScore + dashaScore
  # Gowri policy:
  # - use a simple additive multiplier on the numeric gowriScore
  # - observed baseMarketingScore ceiling in review runs was ~378
  # - observed gowriScore range is -1..2, so 18.5 keeps the strongest positive
  #   Gowri effect just under ~10% of that observed ceiling
  gowriMarketingAdj: >-
    gowriScore * 18.5
  # Special-planet Shadbala policy:
  # - use the core marketing planets (Mercury, Venus, Moon, Jupiter, Sun)
  # - center their average strength near the observed neutral band (~1.27)
  # - apply a simple additive multiplier instead of a banded percentage mapping
  marketingSpecialStrength: >-
    (meS + veS + moS + juS + suS) / 5
  marketingShadbalaAdj: >-
    (marketingSpecialStrength - 1.27) * 120
  marketingScore: >-
    baseMarketingScore + gowriMarketingAdj + marketingShadbalaAdj
order:
  marketingScore: descending
  baseMarketingScore: descending
  muhurtaYogaEffect: descending
fieldSets:
  scenario:
    - date
    - time
  panchang:
    - tithi
    - nakshatra
    - vaara
    - marketingScore
  planetQualities:
    - meQ
  timeFlags:
    - timeF
  muhurtaYogaEffects:
    - positive
    - negative
    - yogas
  mahaDasha:
    - mdLord
  antarDashas:
    - adLord
    - padLord
  shadBalaStrength: none
  objectHouses: all
  ashtakavarga: all
