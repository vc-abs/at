constants:
  tabooTimeFlagsRegex: 'RK|YG|GK'
  studentOnboardingWeekdayWeights:
    thursday: 30
    wednesday: 28
    monday: 22
    friday: 18
  studentOnboardingNakshatras:
    - asvini
    - punarvasu
    - ardra
    - hasta
    - chitra
    - svati
    - shravana
    - revati
  studentOnboardingPreferredTithis:
    - 2
    - 3
    - 5
    - 7
    - 10
    - 11
    - 13
  studentOnboardingDiscouragedTithis:
    - 4
    - 8
    - 9
  studentOnboardingWaningRiktaTithis:
    - 19
    - 24
    - 29
  studentOnboardingWaningPoornaTithis:
    - 20
    - 25
  studentOnboardingMinHouses:
    - h2
    - h4
    - h5
    - h9
  studentOnboardingCorePlanets:
    - jupiter
    - mercury
    - moon
    - venus
    - sun
query: >-
  timeF.str.contains(constants.tabooTimeFlagsRegex, na=False) == False and
  tithi != 0 and
  tithi != 14 and
  meQ != 'malefic' and
  muhurtaYogaEffect >= 0 and
  studentOnboardingMin >= 22 and
  weekdayScore > 0 and
  studentOnboardingScore >= 285
customColumns:
  # House policy:
  # - prioritize foundational learning, grasping power, and teacher support
  # - keep 4th and 5th as the main anchors, with 9th adding guidance and grace
  # - let 2nd/11th/3rd/1st support resources, completion, effort, and adaptation
  studentOnboardingHouseScore: >-
    (h4 * 1.6 + h5 * 1.6 + h9 * 1.4 + h2 * 1.0 + h11 * 0.9 +
    h3 * 0.7 + h1 * 0.8) * 0.40
  muhurtaYogaEffect: >-
    positive + negative
  studentOnboardingMin:
    min: constants.studentOnboardingMinHouses
  weekdayScore: >-
    vaara.map(constants.studentOnboardingWeekdayWeights).fillna(0)
  nakshatraScore: >-
    nakshatra.isin(constants.studentOnboardingNakshatras) * 36
  # Tithi policy:
  # - keep the same first-pass auspicious core but lean more clearly toward
  #   bright-half learning starts by using stronger waning-half penalties
  tithiScore: >-
    tithi.isin(constants.studentOnboardingPreferredTithis) * 26 -
    tithi.isin(constants.studentOnboardingDiscouragedTithis) * 16 -
    ((tithi >= 16) & (tithi <= 20)) * 10 -
    ((tithi >= 21) & (tithi <= 25)) * 16 -
    ((tithi >= 26) & (tithi <= 29)) * 24 -
    tithi.isin(constants.studentOnboardingWaningRiktaTithis) * 5 +
    tithi.isin(constants.studentOnboardingWaningPoornaTithis) * 2
  # Quality policy:
  # - score only the dynamic `Q` labels available in the current implementation
  qualityScore: >-
    (meQ == 'benefic') * 22 +
    (meQ == 'neutral') * 10 +
    (moQ == 'benefic') * 20
  # Dasha policy:
  # - reward education-supportive lords, with Jupiter and Mercury leading the set
  mdPhaseScore: >-
    mdLord.isin(constants.studentOnboardingCorePlanets) *
    (6 + mdlStrength * 4 + mdRemainder * 6)
  adPhaseScore: >-
    adLord.isin(constants.studentOnboardingCorePlanets) *
    (5 + adlStrength * 3 + adRemainder * 4)
  padPhaseScore: >-
    padLord.isin(constants.studentOnboardingCorePlanets) *
    (3 + padlStrength * 2 + padRemainder * 3)
  dashaScore: >-
    mdPhaseScore + adPhaseScore + padPhaseScore
  baseStudentOnboardingScore: >-
    studentOnboardingHouseScore + muhurtaYogaEffect * 12 + weekdayScore +
    nakshatraScore + tithiScore + qualityScore + dashaScore
  # Gowri policy:
  # - keep Gowri additive and reviewable rather than dominant
  gowriStudentOnboardingAdj: >-
    gowriScore * 16.5
  # Special-planet Shadbala policy:
  # - use Jupiter, Mercury, Moon, Venus, and Sun for learning, comprehension,
  #   receptivity, refinement, and institutional formality
  studentOnboardingSpecialStrength: >-
    (juS + meS + moS + veS + suS) / 5
  studentOnboardingShadbalaAdj: >-
    (studentOnboardingSpecialStrength - 1.27) * 120
  studentOnboardingScore: >-
    baseStudentOnboardingScore + gowriStudentOnboardingAdj +
    studentOnboardingShadbalaAdj
order:
  studentOnboardingScore: descending
  baseStudentOnboardingScore: descending
  muhurtaYogaEffect: descending
fieldSets:
  scenario:
    - date
    - time
  panchang:
    - tithi
    - nakshatra
    - vaara
    - studentOnboardingScore
  planetQualities:
    - meQ
    - moQ
  timeFlags:
    - timeF
  muhurtaYogaEffects:
    - positive
    - negative
    - yogas
  mahaDasha:
    - mdLord
  antarDashas:
    - adLord
    - padLord
  shadBalaStrength: none
  objectHouses: all
  ashtakavarga: all
