# Example: parameter sweep over one contract using per-scenario constants.
# Shared `eventScore` / `eventScoreDev` formulas and a shared `report`, with
# `houseHeavy` overriding a single constant (`houseWeight`) via deep-merge.
# See docs/presets-cheatsheet.md §11.
interval: 1d
count: 5
latitude: 23.101
longitude: 77.461
constants:
  houseWeight: 1.0
  minScore: 0
computations:
  fields:
    eventScore: "h1 * constants.houseWeight + h5 + h9"
    eventScoreDev: >-
      (eventScore - eventScore.groupby(scenario).transform('mean'))
      / eventScore.groupby(scenario).transform('std')
report:
  selection: "eventScoreDev >= 1.0 and eventScore >= constants.minScore"
  order:
    eventScoreDev: descending
    eventScore: descending
  fieldSets:
    scenario: all
    panchang: all
    ashtakavarga: all
    computations:
      - eventScore
      - eventScoreDev
scenarios:
  balanced: {}
  houseHeavy:
    name: house-heavy
    constants:
      houseWeight: 2.5
