imports: [../muhurta-base.yml]

computations:
  constants:
    eventWeekdayWeights:
      thursday: 30
      wednesday: 28
      monday: 22
      friday: 18
    eventNakshatras:
      - asvini
      - punarvasu
      - ardra
      - hasta
      - chitra
      - svati
      - shravana
      - revati

    eventPreferredTithis: [2, 3, 5, 7, 10, 11, 13]
    eventDiscouragedTithis: [4, 8, 9]
    eventWaningRiktaTithis: [19, 24, 29]
    eventWaningPoornaTithis: [20, 25]

    eventMinHouses:
      - h2
      - h4
      - h5
      - h9
    eventCorePlanets: [jupiter, mercury, moon, venus, sun]

    eventNakshatraScoreMultiplier: 36
    eventPreferredTithiBonus: 26
    eventTithi15Bonus: 0
    eventDiscouragedTithiPenalty: 16
    eventWaningHalf16to20Penalty: 10
    eventWaningHalf21to25Penalty: 16
    eventWaningHalf26to29Penalty: 24
    eventWaningRiktaPenalty: 5
    eventWaningPoornaBonus: 2

    eventMeBeneficScore: 22
    eventMoBeneficScore: 20

    eventMinThreshold: 22
    eventScoreThreshold: 285

    eventGowriMultiplier: 16.5
    eventSpecialStrengthWeights:
      meS: 1
      veS: 1
      moS: 1
      juS: 1
      suS: 1
      saS: 0
    eventShadbalaCenter: 1.27
    eventShadbalaMultiplier: 120

  fields:
    eventHouseScore: >-
      (h4 * 1.6 + h5 * 1.6 + h9 * 1.4 + h2 * 1.0 + h11 * 0.9 +
      h3 * 0.7 + h1 * 0.8) * 0.40
    baseEventScore: >-
      eventHouseScore + muhurtaYogaEffect * 12 + weekdayScore +
      nakshatraScore + tithiScore + qualityScore + dashaScore
