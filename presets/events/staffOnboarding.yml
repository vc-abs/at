imports: [../muhurta-base.yml]
# Staff joining / onboarding preset. Imports the shared muhurta base and
# supplies only its coefficients and the event-specific score formulas.
computations:
  constants:
    eventWeekdayWeights:
      wednesday: 30
      thursday: 26
      sunday: 18
      monday: 14
      saturday: 10
      friday: 8
    eventNakshatras:
      - asvini
      - rohini
      - punarvasu
      - pushya
      - hasta
      - anuradha
      - shravana
      - dhanishta
      - revati
    eventPreferredTithis: [2, 3, 5, 7, 10, 11, 13]
    eventDiscouragedTithis: [4, 8, 9]
    eventWaningRiktaTithis: [19, 24, 29]
    eventWaningPoornaTithis: [20, 25]
    eventMinHouses: [h1, h2, h6, h10, h11]
    eventCorePlanets: [mercury, sun, jupiter, moon, saturn]
    eventNakshatraBonus: 32
    eventPreferredTithiBonus: 24
    eventFullMoonBonus: 6
    eventDiscouragedTithiPenalty: 16
    eventWaningEarlyPenalty: 6
    eventWaningMidPenalty: 12
    eventWaningLatePenalty: 18
    eventWaningRiktaPenalty: 5
    eventWaningPoornaBonus: 2
    eventMercuryBeneficBonus: 22
    eventMercuryNeutralBonus: 10
    eventMoonBeneficBonus: 20
    eventGowriMultiplier: 16.5
    # Saturn replaces Venus for institutional-structure strength signaling.
    eventStrengthCols: [meS, suS, juS, moS, saS]
    eventShadbalaCenter: 1.22
    eventShadbalaMultiplier: 110
    eventMinThreshold: 22
    eventScoreThreshold: 275
  fields:
    # House policy: prioritize profession, institutional fit, and support from
    # the existing system — 10th and 11th anchor, 1st supports the beginning
    # itself, 2nd and 6th are practical salary/service supports, 7th/9th stay
    # secondary.
    eventHouseScore: >-
      (h10 * 1.6 + h11 * 1.6 + h1 * 1.3 + h2 * 1.1 + h6 * 1.0 +
      h7 * 0.8 + h9 * 0.9) * 0.38
    baseEventScore: >-
      eventHouseScore + muhurtaYogaEffect * 12 + weekdayScore +
      nakshatraScore + tithiScore + qualityScore + dashaScore
    eventScore: >-
      baseEventScore + gowriEventAdj + eventShadbalaAdj
